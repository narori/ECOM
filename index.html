<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECOM Knowledge Bot</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#1D9E75;--teal-d:#0F6E56;--teal-l:#E1F5EE;--teal-m:#5DCAA5;
  --bg:#f8f9fa;--sur:#ffffff;--bdr:#e5e7eb;--txt:#111827;--mut:#6b7280;
  --red:#ef4444;--r:10px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#0f1117;--sur:#1a1d27;--bdr:#2d3140;--txt:#f1f5f9;--mut:#94a3b8;--teal-l:#0a2e22;
}}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
.app{display:grid;grid-template-columns:1fr;min-height:100vh}
@media(max-width:700px){.app{grid-template-columns:1fr}}
.sb{background:var(--sur);border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden}
.sbh{padding:16px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px}
.logo{width:36px;height:36px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:17px}
.sbt{font-size:14px;font-weight:600}
.sbs{font-size:11px;color:var(--mut);margin-top:1px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--teal);display:inline-block;margin-right:4px}
.sbb{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:16px}
.slbl{font-size:10px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px}
.info-box{background:var(--teal-l);border-radius:var(--r);padding:12px;font-size:12px;color:var(--teal-d);line-height:1.5}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.stat{background:var(--teal-l);border-radius:8px;padding:9px 11px}
.stn{font-size:20px;font-weight:700;color:var(--teal-d)}
.stl{font-size:10px;color:var(--teal-d);opacity:.8}
.langs{display:flex;flex-wrap:wrap;gap:5px}
.lb{font-size:11px;padding:4px 11px;border-radius:20px;border:1px solid var(--bdr);background:var(--bg);color:var(--mut);cursor:pointer;transition:.15s;font-weight:500}
.lb:hover{border-color:var(--teal);color:var(--teal)}
.lb.on{background:var(--teal);color:#fff;border-color:var(--teal)}
.main{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{padding:12px 16px;border-bottom:1px solid var(--bdr);background:var(--sur);display:flex;align-items:center;gap:10px;flex-shrink:0}
.tbn{font-weight:600;font-size:14px}
.tbs{font-size:11px;color:var(--mut)}
.tag{font-size:10px;padding:3px 9px;border-radius:20px;background:var(--teal-l);color:var(--teal-d);font-weight:600;flex-shrink:0}
.clr{margin-left:auto;font-size:11px;color:var(--mut);border:none;background:none;cursor:pointer;padding:5px 8px;border-radius:5px;transition:.15s}
.clr:hover{background:var(--bg);color:var(--txt)}
.msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:13px;scroll-behavior:smooth}
.msg{display:flex;gap:9px;max-width:720px;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.msg.u{flex-direction:row-reverse;margin-left:auto}
.av{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.av-b{background:var(--teal);color:#fff;font-size:14px}
.av-u{background:#e0e7ff;color:#3730a3}
.bbl{padding:10px 13px;border-radius:12px;font-size:13px;line-height:1.6;max-width:calc(100% - 42px);word-break:break-word;white-space:pre-wrap}
.msg.b .bbl{background:var(--sur);border:1px solid var(--bdr);border-bottom-left-radius:3px}
.msg.u .bbl{background:var(--teal);color:#fff;border-bottom-right-radius:3px}
.typing{display:flex;gap:4px;align-items:center;padding:4px 0}
.d{width:6px;height:6px;border-radius:50%;background:var(--teal-m);animation:bo .9s infinite}
.d:nth-child(2){animation-delay:.2s}.d:nth-child(3){animation-delay:.4s}
@keyframes bo{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center;gap:12px}
.wi{width:56px;height:56px;border-radius:50%;background:var(--teal-l);display:flex;align-items:center;justify-content:center;font-size:26px}
.welcome h1{font-size:18px;font-weight:600}
.welcome p{font-size:13px;color:var(--mut);max-width:360px;line-height:1.6}
.ia{padding:12px 16px;border-top:1px solid var(--bdr);background:var(--sur);flex-shrink:0}
.irow{display:flex;gap:7px;align-items:flex-end}
.ta{flex:1;resize:none;border:1px solid var(--bdr);border-radius:9px;padding:9px 12px;font-size:13px;font-family:inherit;background:var(--bg);color:var(--txt);line-height:1.5;min-height:40px;max-height:110px;outline:none;transition:border-color .15s}
.ta:focus{border-color:var(--teal)}
.send{width:40px;height:40px;border-radius:9px;background:var(--teal);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s;font-size:16px}
.send:hover{background:var(--teal-d)}
.send:disabled{opacity:.4;cursor:not-allowed}
.hint{font-size:10px;color:var(--mut);margin-top:5px;text-align:center}
</style>
</head>
<body>
<div class="app">

<main class="main">
  <div class="topbar">
    <span style="font-size:20px">🤖</span>
    <div>
      <div class="tbn">ECOM Knowledge Bot</div>
      <div class="tbs">Búsqueda inteligente · Powered by Claude</div>
    </div>
    <span class="tag">RAG activo</span>
    <button class="clr" onclick="clearChat()">🗑 Limpiar</button>
  </div>

  <div class="msgs" id="msgs">
    <div class="welcome" id="ws">
      <div class="wi">🤖</div>
      <h1>ECOM Knowledge Bot</h1>
      <p>Pregúntame lo que quieras sobre el manual de operaciones. Busco en la documentación y respondo solo con información verificada.</p>
    </div>
  </div>

  <div class="ia">
    <div class="irow">
      <textarea class="ta" id="q" placeholder="Escribe tu pregunta en cualquier idioma..." rows="1"></textarea>
      <button class="send" id="send-btn" onclick="send()" title="Enviar">➤</button>
    </div>
    <div class="hint">Enter para enviar · Shift+Enter para nueva línea</div>
  </div>
</main>
</div>

<script>
// ══════════════════════════════════════════════
//  CONFIGURACIÓN
// ══════════════════════════════════════════════
const CONFIG = {
  WORKER_URL: 'https://ecom-proxy.natalia-galvan.workers.dev',
  BOT_NAME: 'ECOM Knowledge Bot',
};
// ══════════════════════════════════════════════

let lang = 'auto', msgCount = 0, sourcesCount = 0, loading = false;

window.onload = () => {
  setupLangs();
  const ta = document.getElementById('q');
  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 110) + 'px';
  });
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
};

function setupLangs() {
  document.getElementById('langs').addEventListener('click', e => {
    const b = e.target.closest('.lb'); if (!b) return;
    document.querySelectorAll('.lb').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    lang = b.dataset.l;
  });
}

function addMsg(role, text) {
  const ws = document.getElementById('ws'); if (ws) ws.remove();
  const c = document.getElementById('msgs');
  const isU = role === 'user';
  const d = document.createElement('div');
  d.className = 'msg ' + (isU ? 'u' : 'b');
  d.innerHTML = `<div class="av ${isU ? 'av-u' : 'av-b'}">${isU ? 'Yo' : '🤖'}</div><div class="bbl">${esc(text)}</div>`;
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
  if (isU) { msgCount++; document.getElementById('s-msgs').textContent = msgCount; }
}

function showTyping() {
  const c = document.getElementById('msgs');
  const d = document.createElement('div'); d.className = 'msg b'; d.id = 'ty';
  d.innerHTML = `<div class="av av-b">🤖</div><div class="bbl"><div class="typing"><div class="d"></div><div class="d"></div><div class="d"></div></div></div>`;
  c.appendChild(d); c.scrollTop = c.scrollHeight;
}
function removeTyping() { const e = document.getElementById('ty'); if (e) e.remove(); }
function esc(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function clearChat() {
  const c = document.getElementById('msgs'); c.innerHTML = ''; msgCount = 0;
  document.getElementById('s-msgs').textContent = 0;
  const ws = document.createElement('div'); ws.id = 'ws'; ws.className = 'welcome';
  ws.innerHTML = `<div class="wi">🤖</div><h1>${CONFIG.BOT_NAME}</h1><p>Chat reiniciado. Haz una nueva pregunta.</p>`;
  c.appendChild(ws);
}

async function send() {
  const q = document.getElementById('q').value.trim();
  if (!q || loading) return;

  loading = true;
  document.getElementById('send-btn').disabled = true;
  const ta = document.getElementById('q'); ta.value = ''; ta.style.height = 'auto';
  addMsg('user', q);
  showTyping();

  try {
    const res = await fetch(CONFIG.WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q, lang })
    });
    const data = await res.json();
    removeTyping();
    if (data.content && data.content[0]) {
      addMsg('bot', data.content[0].text);
    } else if (data.error) {
      addMsg('bot', '⚠️ Error: ' + (data.error.message || JSON.stringify(data.error)));
    } else {
      addMsg('bot', '⚠️ Respuesta inesperada del servidor.');
    }
  } catch(e) {
    removeTyping();
    addMsg('bot', '⚠️ Error de conexión con el servidor. Intenta de nuevo.');
  }

  loading = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('q').focus();
}
</script>
</body>
</html>
